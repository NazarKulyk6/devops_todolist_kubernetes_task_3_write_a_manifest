apiVersion: v1
kind: Pod
metadata:
  name: todoapp
  namespace: todoapp
  labels:
    app: todoapp
spec:
  containers:
    - name: todoapp
      # Replace with your pushed image, e.g. "yourdockerhub/todoapp:3.0.0"
      image: yourdockerhub/todoapp:3.0.0
      ports:
        - containerPort: 8080
      readinessProbe:
        httpGet:
          path: /api/readyz/
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 6
      livenessProbe:
        httpGet:
          path: /api/healthz/
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3

